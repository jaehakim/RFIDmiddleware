# 로그 설정 파일

# 로그 레벨 (DEBUG, INFO, WARN, ERROR)
log.level=INFO

# 파일 로그
log.file.enabled=true
log.file.path=logs/middleware.log
log.file.max.size=10
log.file.max.count=5

# 콘솔 로그
log.console.enabled=true

# UI 로그 (하단 로그패널 → 파일 저장)
log.ui.file.enabled=true
log.ui.file.path=logs/ui.log
log.ui.file.max.size=10
log.ui.file.max.count=5
